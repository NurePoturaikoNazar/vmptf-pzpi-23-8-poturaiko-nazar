{% extends 'blog/base.html' %}
{% block title %}Вхід — ConteXT{% endblock %}
{% block meta_description %}Увійдіть до свого акаунту на ConteXT{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦ ConteXT</div>
  <p class="auth-subtitle">Увійдіть до свого акаунту</p>

  <form method="post" novalidate>
    {% csrf_token %}

    <div class="form-group">
      <label class="form-label" for="id_username">Логін</label>
      <input
        type="text"
        name="username"
        id="id_username"
        class="form-control"
        placeholder="Введіть логін"
        autocomplete="username"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="id_password">Пароль</label>
      <input
        type="password"
        name="password"
        id="id_password"
        class="form-control"
        placeholder="Введіть пароль"
        autocomplete="current-password"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:8px;">
      Увійти →
    </button>
  </form>

  <div class="auth-divider">або</div>

  <div style="text-align:center;">
    <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:12px;">
      Ще не маєте акаунту?
    </p>
    <a href="{% url 'blog:register' %}" class="btn btn-secondary" style="width:100%; justify-content:center;">
      Зареєструватися
    </a>
  </div>
</div>
{% endblock %}
