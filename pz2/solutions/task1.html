<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class = "card">
        
    <label> 
    latitude:
    <input type="text" id="latitude" value="50.00">
    </label>
    <button id="load-weather"> Load Weather </button>

    <label> 
    Longtitude:
    <input type="text" id="longitude" value="36.23">
    </label>
    <button id="load-weather"> Load Weather </button>

    <div id="weather-container"></div>

    <script>
        const container = document.getElementById('weather-container');
        const loadButton = document.getElementById('load-weather');

        loadButton.addEventListener('click', () => {
            const latitude = document.getElementById('latitude').value;
            const longitude = document.getElementById('longitude').value;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`;
        

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response error');
                }
                return response.json();
            })
            .then(data => {
                const weather = data.current_weather;
                container.innerHTML = `
                    <h2>Current Weather</h2>
                    <p>Temperature: ${weather.temperature} °C</p>
                    <p>Wind Speed: ${weather.windspeed} km/h</p>
                    <p>Weather Code: ${weather.weathercode}</p>
                `;
            })
            .catch(error => {
                const errorMsg = document.createElement('p');
                errorMsg.textContent = 'Failed to load weather data.';
                errorMsg.style.color = 'red';
                container.appendChild(errorMsg);
            });

        });
    </script>
</body>
</html>
